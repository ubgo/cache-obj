name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true
      - name: vet
        run: go vet ./...
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.0
          args: --timeout=5m
      - name: test (race)
        run: go test -race -count=2 ./...
      - name: coverage gate (product package = 100%)
        run: |
          go test -coverprofile=cover.out -covermode=atomic .
          TOTAL=$(go tool cover -func=cover.out | tail -1 | grep -oE '[0-9.]+' | tail -1)
          echo "product coverage: $TOTAL% (floor: 100%)"
          if awk "BEGIN{exit !($TOTAL < 100)}"; then
            echo "product coverage $TOTAL% is below 100%"
            exit 1
          fi

  tidy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - name: assert go.mod is tidy
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum 2>/dev/null)" ]; then
            echo "go.mod/go.sum drifted — run 'go mod tidy'"
            exit 1
          fi
